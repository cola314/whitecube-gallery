apiVersion: apps/v1
kind: Deployment
metadata:
  name: whitecube-gallery
  namespace: default
  annotations:
    deploy/restart-at: "1"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: whitecube-gallery
  template:
    metadata:
      labels:
        app: whitecube-gallery
      annotations:
        deploy/restart-at: "1"
    spec:
      containers:
        - name: whitecube-gallery
          image: ghcr.io/cola314/whitecube-gallery:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: DATA_DIR
              value: /app/data
            - name: PORT
              value: "3000"
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: whitecube-gallery-data
